    <circle cx="200" cy="143" r="9" fill="#d4a870" stroke="#5a3a2a" stroke-width="1"/>
    <rect x="193" y="150" width="14" height="18" rx="2" fill="#c8a078" stroke="#5a3a2a" stroke-width="0.8"/>
